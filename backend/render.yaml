services:
  - type: web
    name: rddhi-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        scope: general
      - key: JWT_SECRET
        scope: general
      - key: ENCRYPTION_KEY
        scope: general
      - key: CORS_ORIGINS
        value: "*"
