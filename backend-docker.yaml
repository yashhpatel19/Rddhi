name: rddhi-api
services:
- name: api
  github:
    repo: yashhpatel19/Rddhi
    branch: main
  dockerfile_path: Dockerfile
  build_command: ""
  run_command: ""
  http_port: 8000
  envs:
  - key: ENVIRONMENT
    value: production
  - key: MONGO_URL
    scope: RUN_TIME
  - key: JWT_SECRET
    scope: RUN_TIME
  - key: ENCRYPTION_KEY
    scope: RUN_TIME
  - key: CORS_ORIGINS
    value: "*"
