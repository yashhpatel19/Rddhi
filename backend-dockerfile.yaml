name: rddhi-api
services:
- name: api
  github:
    repo: yashhpatel19/Rddhi
    branch: main
  dockerfile_path: Dockerfile
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xs
  envs:
  - key: MONGO_URL
    scope: RUN_TIME
  - key: JWT_SECRET
    scope: RUN_TIME
  - key: ENCRYPTION_KEY
    scope: RUN_TIME
  - key: CORS_ORIGINS
    value: "*"
