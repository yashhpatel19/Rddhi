name: rddhi-trading-app
services:
- name: api
  github:
    repo: yashhpatel19/Rddhi
    branch: main
  source_dir: backend
  build_command: pip install -r requirements.txt
  run_command: uvicorn server:app --host 0.0.0.0 --port 8080
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xs
  health_check:
    http_path: /health
  envs:
  - key: ENVIRONMENT
    value: production
  - key: MONGO_URL
    scope: RUN_TIME
  - key: JWT_SECRET
    scope: RUN_TIME
  - key: ENCRYPTION_KEY
    scope: RUN_TIME
  - key: CORS_ORIGINS
    scope: RUN_TIME

- name: web
  github:
    repo: yashhpatel19/Rddhi
    branch: main
  source_dir: frontend
  build_command: npm install && npm run build
  run_command: npm start
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-xs
  envs:
  - key: REACT_APP_BACKEND_URL
    scope: RUN_TIME
